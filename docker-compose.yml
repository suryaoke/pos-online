name: pos-online

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-online_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    networks:
      - pos-online-network
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: pos-online_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - pos-online-network
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: pos-online_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-pos_online}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - pos-online-network

  redis:
    image: redis:alpine
    container_name: pos-online_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - pos-online-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pos-online_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
    networks:
      - pos-online-network
    depends_on:
      - mysql

  # ---------------------------------------------------------------------------
  # Vue Frontend — Node.js container
  # Kode Vue ada di folder ./frontend di host,
  # di-mount ke /var/www/frontend di dalam container.
  # Vite dev server listen di port 5173.
  # --host diperlukan agar Vite bisa diakses dari luar container.
  # ---------------------------------------------------------------------------
  node:
    image: node:20-alpine
    container_name: pos-online_node
    restart: unless-stopped
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - pos-online-network
    depends_on:
      - app

networks:
  pos-online-network:
    driver: bridge

volumes:
  mysql-data: